name: Secure Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-check:
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # ← allows uploading scan results
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install flake8 bandit

      - name: Run linter (flake8)
        run: flake8 app.py --max-line-length=100

      - name: Run SAST scan (Bandit)
        run: bandit -r app.py -ll
        continue-on-error: true

      - name: Run Gitleaks
        continue-on-error: true
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.4_linux_x64.tar.gz
          chmod +x gitleaks
          ./gitleaks detect --source=. --verbose --no-git || exit 1

      - name: Build Docker image
        run: docker build -t myapp:${{ github.sha }} .

      - name: Trivy — CVE scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:${{ github.sha }}
          format: sarif
          output: trivy-cve.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Trivy — Dockerfile misconfig scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: -1

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-cve.sarif
        if: always()
        continue-on-error: true
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: infra
          soft_fail: true
      - name: Start app in background
        run: |
          python app.py &
          sleep 3  # wait for app to start

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8080"
          fail_action: false   # won't fail pipeline