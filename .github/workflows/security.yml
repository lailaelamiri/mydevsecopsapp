name: Secure Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # ← needed so Gitleaks can scan full history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install flake8 bandit

      - name: Run linter (flake8)
        run: flake8 app.py --max-line-length=100

      - name: Run SAST scan (Bandit)
        run: bandit -r app.py -ll
      - name: Run Gitleaks
        run: |
          # Download Gitleaks binary directly
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.4_linux_x64.tar.gz
          chmod +x gitleaks

          # Scan entire working directory (not just last commit)
          ./gitleaks detect --source=. --verbose --no-git || exit 1
        