name: Secure Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          pip install flake8 bandit

      - name: Run linter (flake8)
        run: |
          flake8 app.py --max-line-length=100

      - name: Run SAST scan (Bandit)
        run: |
          bandit -r app.py -ll   # -ll = fail on MEDIUM or higher